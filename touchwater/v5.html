<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stillwater · v5</title>
<style>
  :root {
    --void: #0a0e14;
    --deep: #111a26;
    --glow: #4a7a8c;
    --bloom: #c9a96a;
    --mist: #8fb8c4;
    --ink: #d8e4e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--void);
    font-family: ui-serif, Georgia, 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    cursor: crosshair;
  }
  #stage { position: fixed; inset: 0; display: block; }
  #veil {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 45%, rgba(17,26,38,0.4), rgba(10,14,20,0.95));
    z-index: 10; transition: opacity 2.2s ease;
    text-align: center; padding: 2rem;
  }
  #veil.gone { opacity: 0; pointer-events: none; }
  #veil h1 {
    font-weight: 400; font-size: clamp(2.4rem, 9vw, 4.5rem);
    letter-spacing: 0.18em; color: var(--ink);
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(143,184,196,0.35);
  }
  #veil p {
    margin-top: 1.6rem; font-size: clamp(0.85rem, 3.5vw, 1rem);
    letter-spacing: 0.32em; color: var(--mist);
    text-transform: uppercase; opacity: 0.7;
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
  #hint {
    position: fixed; bottom: 1.3rem; left: 0; right: 0;
    text-align: center; color: var(--mist);
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0; transition: opacity 2s ease 1s; pointer-events: none; z-index: 5;
  }
  #hint.show { opacity: 0.35; }
  #ver { position: fixed; top: 1rem; right: 1.1rem; z-index: 6;
    color: var(--mist); font-size: 0.62rem; letter-spacing: 0.3em;
    text-transform: uppercase; opacity: 0.3; pointer-events: none; }
  /* mode selector chip */
  #mode {
    position: fixed; bottom: 3.0rem; left: 50%; transform: translateX(-50%);
    z-index: 8; padding: 0.5rem 1.1rem;
    border: 1px solid rgba(143,184,196,0.22); border-radius: 999px;
    background: rgba(17,26,38,0.45); color: var(--ink);
    font-size: 0.66rem; letter-spacing: 0.28em; text-transform: uppercase;
    opacity: 0; pointer-events: none; transition: opacity 1.6s ease, border-color 0.5s ease, box-shadow 0.6s ease;
    user-select: none; -webkit-user-select: none; cursor: pointer;
    white-space: nowrap;
  }
  #mode.show { opacity: 0.6; pointer-events: auto; }
  #mode:active { border-color: rgba(143,184,196,0.6); }
  #mode .label { opacity: 0.45; }
  #mode .name { color: var(--bloom); }
  #mode .arrow { opacity: 0.4; margin-left: 0.5em; }
  #mode.flash { opacity: 0.95; box-shadow: 0 0 28px rgba(74,122,140,0.3); }
  @media (prefers-reduced-motion: reduce) {
    #veil p { animation: none; opacity: 0.6; }
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="veil">
  <h1>Stillwater</h1>
  <p>touch to begin</p>
</div>
<div id="hint">hold · drag · many fingers</div>
<div id="mode"><span class="label">mode</span> <span class="name">pentatonic</span><span class="arrow">›</span></div>
<div id="ver">v5</div>

<script>
const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

/* ---------- SCALES / MODES ---------- */
// each mode: a tonic (drone root, Hz) + interval steps in semitones.
// the bed drones on root + fifth + octave, consonant with every mode below.
const MODES = [
  { name:'pentatonic', tonic:73.42,  steps:[0,3,5,7,10] },        // D minor pentatonic
  { name:'dorian',     tonic:73.42,  steps:[0,2,3,5,7,9,10] },    // D dorian
  { name:'lydian',     tonic:87.31,  steps:[0,2,4,6,7,9,11] },    // F lydian
  { name:'major pent', tonic:97.999, steps:[0,2,4,7,9] },         // G major pentatonic
  { name:'aeolian',    tonic:110.00, steps:[0,2,3,5,7,8,10] },    // A natural minor
  { name:'hirajoshi',  tonic:73.42,  steps:[0,2,3,7,8] },         // D hirajoshi (japanese)
];
let modeIdx = 0;

function buildScale(tonic, steps){
  const out = [];
  for(let oct=0; oct<4; oct++){
    for(const s of steps) out.push(tonic * Math.pow(2, oct + s/12));
  }
  return out.sort((a,b)=>a-b);
}
function bedFor(tonic){
  return [tonic, tonic*Math.pow(2,7/12), tonic*2];   // root, fifth, octave
}

let SCALE = buildScale(MODES[0].tonic, MODES[0].steps);

/* ---------- AUDIO ---------- */
let AC, master, tide, reverbBus, wet, analyser, started=false;
let levelData = null;
const droneVoices = [];   // {o1,o2} refs so the bed can retune on mode change

function makeReverb(ac){
  const len = ac.sampleRate * 4.5;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let c=0;c<2;c++){
    const d = buf.getChannelData(c);
    for(let i=0;i<len;i++){
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 3.2);
    }
  }
  const conv = ac.createConvolver(); conv.buffer = buf; return conv;
}

function unlock(){
  if(!AC) return;
  if(AC.state === 'suspended') AC.resume();
  // play a silent buffer — required to unlock audio on iOS Safari
  const b = AC.createBuffer(1, 1, 22050);
  const s = AC.createBufferSource();
  s.buffer = b; s.connect(AC.destination); s.start(0);
}

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  unlock();

  master = AC.createGain(); master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.85, AC.currentTime + 4);
  master.connect(AC.destination);

  analyser = AC.createAnalyser();
  analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.85;
  levelData = new Uint8Array(analyser.fftSize);
  master.connect(analyser);

  tide = AC.createGain(); tide.gain.value = 0.82;
  tide.connect(master);
  const tideLFO = AC.createOscillator(); tideLFO.type='sine'; tideLFO.frequency.value = 0.018;
  const tideAmt = AC.createGain(); tideAmt.gain.value = 0.16;
  tideLFO.connect(tideAmt); tideAmt.connect(tide.gain); tideLFO.start();

  reverbBus = makeReverb(AC);
  wet = AC.createGain(); wet.gain.value = 0.9;
  reverbBus.connect(wet); wet.connect(tide);

  startDrones(MODES[modeIdx].tonic);
  scheduleBloom();
}

// Evolving drone bed — retunable
function startDrones(tonic){
  const bedRoots = bedFor(tonic);
  bedRoots.forEach((f, i) => {
    const o1 = AC.createOscillator(); o1.type='sine'; o1.frequency.value=f;
    const o2 = AC.createOscillator(); o2.type='triangle'; o2.frequency.value=f*1.003;
    const g = AC.createGain(); g.gain.value = 0;
    const filt = AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=600;

    const lfo = AC.createOscillator(); lfo.type='sine';
    lfo.frequency.value = 0.03 + i*0.017;
    const lfoG = AC.createGain(); lfoG.gain.value = 0.06;
    lfo.connect(lfoG); lfoG.connect(g.gain);

    const flfo = AC.createOscillator(); flfo.type='sine';
    flfo.frequency.value = 0.012 + i*0.009;
    const flfoG = AC.createGain(); flfoG.gain.value = 280;
    flfo.connect(flfoG); flfoG.connect(filt.frequency);

    o1.connect(filt); o2.connect(filt); filt.connect(g);
    g.connect(reverbBus); g.connect(tide);
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(0.10, AC.currentTime + 6 + i*2);

    [o1,o2,lfo,flfo].forEach(n=>n.start());
    droneVoices.push({ o1, o2 });
  });
}
function retuneBed(tonic){
  const bedRoots = bedFor(tonic);
  const now = AC.currentTime;
  droneVoices.forEach((d, i) => {
    const f = bedRoots[i % bedRoots.length];
    d.o1.frequency.linearRampToValueAtTime(f, now + 2.5);
    d.o2.frequency.linearRampToValueAtTime(f*1.003, now + 2.5);
  });
}

// transient pluck/bell tone (self-player)
function voice(freq, vel=0.5, x=0.5){
  if(!AC) return;
  const t = AC.currentTime;
  const o1 = AC.createOscillator(); o1.type='sine'; o1.frequency.value=freq;
  const o2 = AC.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.001;
  const o2g = AC.createGain(); o2g.gain.value=0.25;
  const g = AC.createGain(); g.gain.value=0;
  const filt = AC.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.value = 900 + vel*2400; filt.Q.value=1.5;
  const pan = AC.createStereoPanner(); pan.pan.value = (x-0.5)*1.4;

  const peak = 0.10 + vel*0.22;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 3.2 + vel*2);

  o1.connect(filt); o2.connect(o2g); o2g.connect(filt);
  filt.connect(g); g.connect(pan);
  pan.connect(reverbBus); pan.connect(tide);
  o1.start(t); o2.start(t);
  o1.stop(t+6); o2.stop(t+6);
}

// SUSTAINED voice — swells while held, glides, releases with a tail
function holdVoice(freq, x){
  if(!AC) return null;
  const t = AC.currentTime;
  const o1 = AC.createOscillator(); o1.type='sine'; o1.frequency.setValueAtTime(freq, t);
  const o2 = AC.createOscillator(); o2.type='triangle'; o2.frequency.setValueAtTime(freq*1.004, t);
  const o2g = AC.createGain(); o2g.gain.value = 0.4;
  const g = AC.createGain(); g.gain.value = 0;
  const filt = AC.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.value = 1200; filt.Q.value = 2;
  const pan = AC.createStereoPanner(); pan.pan.value = (x-0.5)*1.4;

  const vib = AC.createOscillator(); vib.type='sine'; vib.frequency.value = 4.5 + Math.random()*1.5;
  const vibG = AC.createGain(); vibG.gain.value = freq*0.004;
  vib.connect(vibG); vibG.connect(o1.frequency); vibG.connect(o2.frequency);

  filt.frequency.setValueAtTime(900, t);
  filt.frequency.linearRampToValueAtTime(2600, t + 6);

  const sustain = 0.16;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(sustain, t + 0.7);

  o1.connect(filt); o2.connect(o2g); o2g.connect(filt);
  filt.connect(g); g.connect(pan);
  pan.connect(reverbBus); pan.connect(tide);
  [o1,o2,vib].forEach(n=>n.start(t));

  let dead = false;
  return {
    glide(nf, nx){
      if(dead) return;
      const now = AC.currentTime;
      o1.frequency.linearRampToValueAtTime(nf, now + 0.12);
      o2.frequency.linearRampToValueAtTime(nf*1.004, now + 0.12);
      vibG.gain.setTargetAtTime(nf*0.004, now, 0.1);
      pan.pan.linearRampToValueAtTime((nx-0.5)*1.4, now + 0.12);
    },
    release(){
      if(dead) return; dead = true;
      const now = AC.currentTime;
      g.gain.cancelScheduledValues(now);
      g.gain.setValueAtTime(g.gain.value, now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 3.4);
      [o1,o2,vib].forEach(n=>n.stop(now + 4));
    }
  };
}

/* ---- self-player: melodic memory + dynamics ---- */
let melIdx = Math.floor(SCALE.length/2);
let center = melIdx;
let tidePhase = 0;
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function scheduleBloom(){
  if(!AC) return;
  tidePhase += 0.12;
  const density = 0.5 + 0.5*Math.sin(tidePhase);
  const rest = Math.random() > (0.45 + density*0.5);

  if(!rest){
    center += (Math.random()-0.5)*0.7;
    center = Math.max(2, Math.min(SCALE.length-3, center));

    let next;
    if(Math.random() < 0.28){
      next = Math.round(center + (Math.random()-0.5)*2);
    } else {
      next = melIdx + pick([-2,-1,-1,-1,1,1,1,2]);
    }
    next = Math.max(0, Math.min(SCALE.length-1, next));
    if(next === melIdx) next += (Math.random()<0.5?-1:1);
    next = Math.max(0, Math.min(SCALE.length-1, next));
    melIdx = next;

    const note = SCALE[melIdx];
    const x = Math.random();
    const vel = 0.18 + density*0.35*Math.random();
    voice(note, vel, x);
    spawnBloom(x*W, (1 - melIdx/SCALE.length)*0.7*H + 0.15*H, note);
  }

  const next = (rest ? 4500 : 2600) + (1-density)*7000 + Math.random()*3500;
  setTimeout(scheduleBloom, next);
}

function nearestNote(y){
  const idx = Math.floor((1 - y/H) * SCALE.length);
  return SCALE[Math.max(0, Math.min(SCALE.length-1, idx))];
}

/* ---- mode switching ---- */
const modeEl = document.getElementById('mode');
const modeNameEl = modeEl.querySelector('.name');
let flashTO = null;
function cycleMode(){
  if(!AC) return;
  modeIdx = (modeIdx + 1) % MODES.length;
  const m = MODES[modeIdx];
  SCALE = buildScale(m.tonic, m.steps);
  // keep the self-player in range of the new scale
  melIdx = Math.max(0, Math.min(SCALE.length-1, melIdx));
  center = Math.max(2, Math.min(SCALE.length-3, center));
  retuneBed(m.tonic);
  // soft confirming tone on the new tonic
  voice(SCALE[Math.floor(SCALE.length*0.35)], 0.3, 0.5);
  spawnBloom(W*0.5, H*0.55, SCALE[Math.floor(SCALE.length*0.35)]);
  // UI feedback
  modeNameEl.textContent = m.name;
  modeEl.classList.add('flash');
  clearTimeout(flashTO);
  flashTO = setTimeout(()=>modeEl.classList.remove('flash'), 700);
}

/* ---------- VISUALS ---------- */
const ripples = [];
const motes = [];
for(let i=0;i<70;i++){
  motes.push({
    x: Math.random()*W, y: Math.random()*H,
    r: 0.4 + Math.random()*1.6,
    a: 0.05 + Math.random()*0.25,
    vx: (Math.random()-0.5)*0.12,
    vy: -0.05 - Math.random()*0.18,
    ph: Math.random()*Math.PI*2
  });
}

function spawnBloom(x, y, freq){
  const hueT = (freq - SCALE[0]) / (SCALE[SCALE.length-1]-SCALE[0]);
  ripples.push({ x, y, r: 4, max: 120 + 240*(1-hueT), life: 1, t: hueT });
}

let level = 0;
function readLevel(){
  if(!analyser) return 0;
  analyser.getByteTimeDomainData(levelData);
  let sum = 0;
  for(let i=0;i<levelData.length;i++){ const v=(levelData[i]-128)/128; sum += v*v; }
  const rms = Math.sqrt(sum/levelData.length);
  level += (Math.min(1, rms*3.2) - level) * 0.08;
  return level;
}

let tGlobal = 0;
function frame(){
  tGlobal += 0.016;
  const lvl = readLevel();

  const g = ctx.createRadialGradient(
    W*(0.5 + 0.12*Math.sin(tGlobal*0.07)), H*(0.45 + 0.1*Math.cos(tGlobal*0.05)),
    0, W*0.5, H*0.5, Math.max(W,H)*0.85);
  g.addColorStop(0, `rgba(17,26,38,${0.16 + lvl*0.10})`);
  g.addColorStop(1, 'rgba(10,14,20,0.30)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  const boost = 0.6 + lvl*1.8;
  for(const m of motes){
    m.x += m.vx*(1+lvl*0.8); m.y += m.vy*(1+lvl*0.8); m.ph += 0.02 + lvl*0.05;
    if(m.y < -10){ m.y = H+10; m.x = Math.random()*W; }
    if(m.x < -10) m.x = W+10; if(m.x > W+10) m.x = -10;
    const tw = m.a * (0.5 + 0.5*Math.sin(m.ph)) * boost;
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r*(1+lvl*0.5), 0, Math.PI*2);
    ctx.fillStyle = `rgba(143,184,196,${Math.min(0.8, tw)})`;
    ctx.fill();
  }

  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i];
    r.r += (r.max - r.r) * 0.035;
    r.life -= 0.009;
    if(r.life <= 0){ ripples.splice(i,1); continue; }
    const warm = `rgba(201,169,106,`;
    const cool = `rgba(143,184,196,`;
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = (r.t>0.55?warm:cool) + (r.life*0.5) + ')';
    ctx.stroke();
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r*0.6, 0, Math.PI*2);
    ctx.strokeStyle = cool + (r.life*0.28) + ')';
    ctx.stroke();
    const cg = ctx.createRadialGradient(r.x,r.y,0,r.x,r.y,r.r*0.5);
    cg.addColorStop(0, (r.t>0.55?warm:cool) + (r.life*0.18) + ')');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r*0.5,0,Math.PI*2); ctx.fill();
  }
  requestAnimationFrame(frame);
}
frame();

/* ---------- INTERACTION ---------- */
const veil = document.getElementById('veil');
const hint = document.getElementById('hint');
const held = new Map();
const dragStamp = new Map();

function begin(){
  if(!started){
    started = true;
    initAudio();
    veil.classList.add('gone');
    setTimeout(()=>{ hint.classList.add('show'); modeEl.classList.add('show'); }, 1500);
    setTimeout(()=>hint.classList.remove('show'), 10000);
  }
}

function down(id, x, y){
  if(AC && AC.state !== 'running') unlock();
  if(held.size >= 8) return;
  const freq = nearestNote(y);
  const v = holdVoice(freq, x/W);
  if(v) held.set(id, v);
  spawnBloom(x, y, freq);
  dragStamp.set(id, performance.now());
}
function move(id, x, y){
  const v = held.get(id); if(!v) return;
  v.glide(nearestNote(y), x/W);
  const now = performance.now();
  if(now - (dragStamp.get(id)||0) > 110){
    dragStamp.set(id, now);
    spawnBloom(x, y, nearestNote(y));
  }
}
function up(id){
  const v = held.get(id); if(v) v.release();
  held.delete(id); dragStamp.delete(id);
}

function onPointerDown(e){
  e.preventDefault();
  begin();
  down(e.pointerId, e.clientX, e.clientY);
}
function onPointerMove(e){
  if(!started || !held.has(e.pointerId)) return;
  e.preventDefault();
  move(e.pointerId, e.clientX, e.clientY);
}
function onPointerUp(e){ up(e.pointerId); }

cv.addEventListener('pointerdown', onPointerDown, {passive:false});
cv.addEventListener('pointermove', onPointerMove, {passive:false});
window.addEventListener('pointerup', onPointerUp);
window.addEventListener('pointercancel', onPointerUp);
veil.addEventListener('pointerdown', onPointerDown, {passive:false});

// mode chip — taps cycle the scale, and never trigger a note
modeEl.addEventListener('pointerdown', e=>{ e.preventDefault(); e.stopPropagation(); cycleMode(); });

document.addEventListener('visibilitychange', ()=>{
  if(!AC || !master) return;
  const now = AC.currentTime;
  master.gain.cancelScheduledValues(now);
  master.gain.setValueAtTime(master.gain.value, now);
  master.gain.linearRampToValueAtTime(document.hidden ? 0.0 : 0.85, now + (document.hidden?0.4:1.5));
});
</script>
</body>
</html>
