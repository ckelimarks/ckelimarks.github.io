<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Confluence · v3</title>
<style>
  :root {
    --void: #0a0e14;
    --deep: #111a26;
    --glow: #4a7a8c;
    --bloom: #c9a96a;
    --mist: #8fb8c4;
    --ink: #d8e4e8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--void);
    font-family: ui-serif, Georgia, 'Times New Roman', serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    cursor: crosshair;
  }
  #stage { position: fixed; inset: 0; display: block; }
  #veil {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 45%, rgba(17,26,38,0.4), rgba(10,14,20,0.95));
    z-index: 10; transition: opacity 2.2s ease;
    text-align: center; padding: 2rem;
  }
  #veil.gone { opacity: 0; pointer-events: none; }
  #veil h1 {
    font-weight: 400; font-size: clamp(2.4rem, 9vw, 4.5rem);
    letter-spacing: 0.18em; color: var(--ink);
    text-transform: uppercase;
    text-shadow: 0 0 40px rgba(143,184,196,0.35);
  }
  #veil p {
    margin-top: 1.6rem; font-size: clamp(0.85rem, 3.5vw, 1rem);
    letter-spacing: 0.32em; color: var(--mist);
    text-transform: uppercase; opacity: 0.7;
    animation: breathe 5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
  #hint {
    position: fixed; bottom: 1.4rem; left: 0; right: 0;
    text-align: center; color: var(--mist);
    font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase;
    opacity: 0; transition: opacity 2s ease 1s; pointer-events: none; z-index: 5;
  }
  #hint.show { opacity: 0.35; }
  #ver { position: fixed; top: 1rem; left: 1.1rem; z-index: 6;
    color: var(--mist, #8fb8c4); font-size: 0.62rem; letter-spacing: 0.3em;
    text-transform: uppercase; opacity: 0.3; pointer-events: none; }
  @media (prefers-reduced-motion: reduce) {
    #veil p { animation: none; opacity: 0.6; }
  }

  /* control surface */
  #gear {
    position: fixed; top: 1.1rem; right: 1.1rem; z-index: 8;
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--mist); opacity: 0; pointer-events: none;
    border: 1px solid rgba(143,184,196,0.25);
    background: rgba(10,14,20,0.35); backdrop-filter: blur(6px);
    transition: opacity 1.5s ease, transform .4s ease, background .4s ease;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #gear.show { opacity: 0.55; pointer-events: auto; }
  #gear:active { transform: scale(0.92); }
  #gear svg { width: 20px; height: 20px; }

  #panel {
    position: fixed; z-index: 9; right: 1.1rem; top: 4rem;
    width: min(300px, calc(100vw - 2.2rem));
    background: rgba(11,16,24,0.78); backdrop-filter: blur(16px);
    border: 1px solid rgba(143,184,196,0.18); border-radius: 18px;
    padding: 1.25rem 1.3rem 1.4rem; color: var(--ink);
    opacity: 0; transform: translateY(-8px) scale(0.98);
    pointer-events: none; transition: opacity .35s ease, transform .35s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45);
  }
  #panel.open { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
  #panel .label {
    font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--mist); opacity: 0.65; margin: 0 0 0.7rem;
  }
  #modes { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1.4rem; }
  .mode {
    font-family: inherit; font-size: 0.82rem; letter-spacing: 0.12em;
    color: var(--mist); text-align: center; padding: 0.6rem 0.4rem;
    border: 1px solid rgba(143,184,196,0.2); border-radius: 11px;
    background: rgba(143,184,196,0.04); cursor: pointer;
    transition: all .35s ease; -webkit-tap-highlight-color: transparent;
  }
  .mode:active { transform: scale(0.96); }
  .mode.active {
    color: var(--ink); border-color: rgba(201,169,106,0.55);
    background: rgba(201,169,106,0.12);
    box-shadow: 0 0 22px rgba(201,169,106,0.18);
  }
  .slider { margin-bottom: 1.05rem; }
  .slider:last-child { margin-bottom: 0; }
  .slider .name {
    display: flex; justify-content: space-between;
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--mist); opacity: 0.7; margin-bottom: 0.45rem;
  }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 2px;
    background: rgba(143,184,196,0.25); border-radius: 2px; outline: none; margin: 0;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--ink);
    box-shadow: 0 0 12px rgba(143,184,196,0.55); cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px; border: none; border-radius: 50%;
    background: var(--ink); box-shadow: 0 0 12px rgba(143,184,196,0.55); cursor: pointer;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="veil">
  <h1>Confluence</h1>
  <p>touch to begin</p>
</div>
<div id="hint">where ripples meet, they sing</div>
<div id="ver">v3</div>

<div id="gear" aria-label="Open controls">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
    <circle cx="12" cy="12" r="3.2"/>
    <path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/>
  </svg>
</div>

<div id="panel">
  <p class="label">Mode</p>
  <div id="modes">
    <button class="mode active" data-mode="tide">Tide</button>
    <button class="mode" data-mode="dawn">Dawn</button>
    <button class="mode" data-mode="temple">Temple</button>
    <button class="mode" data-mode="drift">Drift</button>
  </div>
  <div class="slider">
    <div class="name"><span>Space</span></div>
    <input type="range" id="s-space" min="0" max="100" value="90">
  </div>
  <div class="slider">
    <div class="name"><span>Light</span></div>
    <input type="range" id="s-light" min="0" max="100" value="26">
  </div>
  <div class="slider">
    <div class="name"><span>Density</span></div>
    <input type="range" id="s-density" min="0" max="100" value="28">
  </div>
  <div class="slider">
    <div class="name"><span>Drift</span></div>
    <input type="range" id="s-drift" min="0" max="100" value="44">
  </div>
</div>

<script>
const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let W, H, DPR;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener('resize', resize);

/* ---------- AUDIO ---------- */
let AC, master, reverbBus, started=false;
let lastHarmony = 0; // global cooldown so harmonies don't pile up

// ---- modes: each retunes scale, drones, and palette ----
const MODES = {
  tide:   { name:'Tide',   root:146.83, degrees:[0,3,5,7,10],     // D minor pentatonic
            warm:'rgba(201,169,106,', cool:'rgba(143,184,196,', bg1:'17,26,38',  bg2:'10,14,20',  spark:'232,224,210' },
  dawn:   { name:'Dawn',   root:130.81, degrees:[0,2,4,7,9],      // C major pentatonic
            warm:'rgba(226,158,128,', cool:'rgba(224,196,148,', bg1:'34,22,26',  bg2:'18,11,13',  spark:'255,236,208' },
  temple: { name:'Temple', root:138.59, degrees:[0,2,3,7,8],      // Hirajoshi
            warm:'rgba(178,148,214,', cool:'rgba(128,148,212,', bg1:'22,18,40',  bg2:'11,9,22',   spark:'226,214,255' },
  drift:  { name:'Drift',  root:130.81, degrees:[0,2,4,6,8,10],   // whole-tone
            warm:'rgba(150,210,198,', cool:'rgba(168,190,200,', bg1:'14,32,33',  bg2:'7,17,19',   spark:'220,245,240' },
};
let CURRENT = MODES.tide;

let SCALE = [];
function buildScale(m){
  const out = [];
  for(let oct=-1; oct<=2; oct++){
    for(const s of m.degrees) out.push(m.root * Math.pow(2, oct + s/12));
  }
  out.sort((a,b)=>a-b);
  SCALE = out;
}
buildScale(CURRENT);

// morph parameters (driven by sliders)
let wetGain;                 // reverb amount (Space)
let toneBase = 900;          // filter base for plucks (Light)
let densityMul = 1;          // self-play frequency (Density)
let driftMul = 1;            // drone modulation depth (Drift)
const driftNodes = [];       // {node, base} for drift scaling
const droneVoices = [];      // {o1,o2,mult} for retuning

function makeReverb(ac){
  const len = ac.sampleRate * 4.5;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let c=0;c<2;c++){
    const d = buf.getChannelData(c);
    for(let i=0;i<len;i++){
      d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 3.2);
    }
  }
  const cv = ac.createConvolver(); cv.buffer = buf; return cv;
}

function unlock(){
  if(!AC) return;
  if(AC.state === 'suspended') AC.resume();
  // play a silent buffer — required to unlock audio on iOS Safari
  const b = AC.createBuffer(1, 1, 22050);
  const s = AC.createBufferSource();
  s.buffer = b; s.connect(AC.destination); s.start(0);
}

function initAudio(){
  AC = new (window.AudioContext||window.webkitAudioContext)();
  unlock();
  master = AC.createGain(); master.gain.value = 0;
  master.gain.linearRampToValueAtTime(0.85, AC.currentTime + 4);
  master.connect(AC.destination);

  reverbBus = makeReverb(AC);
  wetGain = AC.createGain(); wetGain.gain.value = 0.9;
  reverbBus.connect(wetGain); wetGain.connect(master);

  // dry path lightly mixed
  startDrones(wetGain);
  scheduleBloom();
}

// Evolving drone bed — retunable per mode
function startDrones(reverbWet){
  const mults = [0.5, 0.75, 1.0]; // tonic / fifth / octave, relative to mode root
  mults.forEach((mult, i) => {
    const f = CURRENT.root * mult;
    const o1 = AC.createOscillator(); o1.type='sine'; o1.frequency.value=f;
    const o2 = AC.createOscillator(); o2.type='triangle'; o2.frequency.value=f*1.003;
    const g = AC.createGain(); g.gain.value = 0;
    const filt = AC.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=600;

    // slow LFO on amplitude — the bed breathes
    const lfo = AC.createOscillator(); lfo.type='sine';
    lfo.frequency.value = 0.03 + i*0.017;
    const lfoG = AC.createGain(); lfoG.gain.value = 0.06;
    lfo.connect(lfoG); lfoG.connect(g.gain);
    driftNodes.push({ node: lfoG, base: 0.06 });

    // slow filter sweep
    const flfo = AC.createOscillator(); flfo.type='sine';
    flfo.frequency.value = 0.012 + i*0.009;
    const flfoG = AC.createGain(); flfoG.gain.value = 280;
    flfo.connect(flfoG); flfoG.connect(filt.frequency);
    driftNodes.push({ node: flfoG, base: 280 });

    o1.connect(filt); o2.connect(filt); filt.connect(g);
    g.connect(reverbWet); g.connect(master);
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(0.10, AC.currentTime + 6 + i*2);

    [o1,o2,lfo,flfo].forEach(n=>n.start());
    droneVoices.push({ o1, o2, mult });
  });
}

// Smoothly glide the drone bed to the current mode's root
function retuneDrones(){
  if(!AC) return;
  const t = AC.currentTime;
  droneVoices.forEach(v => {
    const f = CURRENT.root * v.mult;
    v.o1.frequency.linearRampToValueAtTime(f, t+3);
    v.o2.frequency.linearRampToValueAtTime(f*1.003, t+3);
  });
}

// A pluck/bell tone in key
function voice(freq, vel=0.5, x=0.5){
  if(!AC) return;
  const t = AC.currentTime;
  const o1 = AC.createOscillator(); o1.type='sine'; o1.frequency.value=freq;
  const o2 = AC.createOscillator(); o2.type='sine'; o2.frequency.value=freq*2.001;
  const o2g = AC.createGain(); o2g.gain.value=0.25;
  const g = AC.createGain(); g.gain.value=0;
  const filt = AC.createBiquadFilter(); filt.type='lowpass';
  filt.frequency.value = toneBase + vel*2400; filt.Q.value=1.5;
  const pan = AC.createStereoPanner(); pan.pan.value = (x-0.5)*1.4;

  const peak = 0.10 + vel*0.22;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 3.2 + vel*2);

  o1.connect(filt); o2.connect(o2g); o2g.connect(filt);
  filt.connect(g); g.connect(pan);
  pan.connect(reverbBus); pan.connect(master);
  o1.start(t); o2.start(t);
  o1.stop(t+6); o2.stop(t+6);
}

// Sparse self-playing melody so it evolves on its own
function scheduleBloom(){
  if(!AC) return;
  const note = SCALE[Math.floor(Math.random()*SCALE.length)];
  const x = Math.random();
  voice(note, 0.25 + Math.random()*0.3, x);
  spawnBloom(x*W, (0.2+Math.random()*0.6)*H, note);
  const next = (3500 + Math.random()*6000) / densityMul;
  setTimeout(scheduleBloom, next);
}

function nearestNote(y){
  // higher on screen = higher pitch
  const idx = Math.floor((1 - y/H) * SCALE.length);
  return SCALE[Math.max(0, Math.min(SCALE.length-1, idx))];
}

/* ---------- VISUALS ---------- */
const ripples = [];
const sparks = [];
let rippleId = 0;
const harmonized = new Set();
const motes = [];
for(let i=0;i<70;i++){
  motes.push({
    x: Math.random()*W, y: Math.random()*H,
    r: 0.4 + Math.random()*1.6,
    a: 0.05 + Math.random()*0.25,
    vx: (Math.random()-0.5)*0.12,
    vy: -0.05 - Math.random()*0.18,
    ph: Math.random()*Math.PI*2
  });
}

function snapToScale(f){
  let best = SCALE[0], bd = Infinity;
  for(const s of SCALE){ const d = Math.abs(s-f); if(d<bd){bd=d; best=s;} }
  return best;
}

function spawnBloom(x, y, freq){
  const hueT = (freq - SCALE[0]) / (SCALE[SCALE.length-1]-SCALE[0]);
  ripples.push({ id: ++rippleId, x, y, r: 4, max: 120 + 240*(1-hueT), life: 1, t: hueT, freq });
}

// When two rings touch, both notes ring out together + a binding fifth
function harmonize(a, b, cx, cy){
  voice(a.freq, 0.4, cx/W);
  voice(b.freq, 0.4, cx/W);
  const low = Math.min(a.freq, b.freq);
  voice(snapToScale(low*1.5), 0.22, cx/W); // consonant fifth, in key
  // bright contact flare
  sparks.push({ x: cx, y: cy, r: 6, max: 70, life: 1 });
}

let tGlobal = 0;
function frame(){
  tGlobal += 0.016;
  // deep gradient that drifts
  const g = ctx.createRadialGradient(
    W*(0.5 + 0.12*Math.sin(tGlobal*0.07)), H*(0.45 + 0.1*Math.cos(tGlobal*0.05)),
    0, W*0.5, H*0.5, Math.max(W,H)*0.85);
  g.addColorStop(0, `rgba(${CURRENT.bg1},0.18)`);
  g.addColorStop(1, `rgba(${CURRENT.bg2},0.30)`);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // motes
  for(const m of motes){
    m.x += m.vx; m.y += m.vy; m.ph += 0.02;
    if(m.y < -10){ m.y = H+10; m.x = Math.random()*W; }
    if(m.x < -10) m.x = W+10; if(m.x > W+10) m.x = -10;
    const tw = m.a * (0.5 + 0.5*Math.sin(m.ph));
    ctx.beginPath();
    ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    ctx.fillStyle = CURRENT.cool + tw + ')';
    ctx.fill();
  }

  // ripples
  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i];
    r.r += (r.max - r.r) * 0.035;
    r.life -= 0.009;
    if(r.life <= 0){ ripples.splice(i,1); continue; }
    const warm = CURRENT.warm;   // mode accent
    const cool = CURRENT.cool;   // mode base
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = (r.t>0.55?warm:cool) + (r.life*0.5) + ')';
    ctx.stroke();
    ctx.beginPath(); ctx.arc(r.x, r.y, r.r*0.6, 0, Math.PI*2);
    ctx.strokeStyle = cool + (r.life*0.28) + ')';
    ctx.stroke();
    // soft center glow
    const cg = ctx.createRadialGradient(r.x,r.y,0,r.x,r.y,r.r*0.5);
    cg.addColorStop(0, (r.t>0.55?warm:cool) + (r.life*0.18) + ')');
    cg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r*0.5,0,Math.PI*2); ctx.fill();
  }

  // confluence: detect rings whose edges touch, harmonize once per pair
  for(let i=0;i<ripples.length;i++){
    for(let j=i+1;j<ripples.length;j++){
      const a = ripples[i], b = ripples[j];
      const key = a.id<b.id ? a.id+'_'+b.id : b.id+'_'+a.id;
      if(harmonized.has(key)) continue;
      const dx = a.x-b.x, dy = a.y-b.y;
      const d = Math.hypot(dx, dy);
      // rings born close together (e.g. during a drag) shouldn't flare —
      // require their centers to be a real distance apart
      if(d < 90){ harmonized.add(key); continue; }
      // rings' outer edges meet
      if(d <= a.r + b.r && d >= Math.abs(a.r - b.r) && d > 1){
        harmonized.add(key);
        // global cooldown: at most one harmony every ~450ms
        if(performance.now() - lastHarmony < 450) continue;
        lastHarmony = performance.now();
        // contact point on a's edge, toward b
        harmonize(a, b, a.x - dx*(a.r/d), a.y - dy*(a.r/d));
      }
    }
  }
  // prune stale pair keys occasionally
  if(harmonized.size > 400) harmonized.clear();

  // contact sparks
  for(let i=sparks.length-1;i>=0;i--){
    const s = sparks[i];
    s.r += (s.max - s.r) * 0.10;
    s.life -= 0.025;
    if(s.life<=0){ sparks.splice(i,1); continue; }
    const fg = ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r);
    fg.addColorStop(0, `rgba(${CURRENT.spark},${s.life*0.55})`);
    fg.addColorStop(0.4, CURRENT.warm + (s.life*0.35) + ')');
    fg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = `rgba(${CURRENT.spark},${s.life*0.4})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.7,0,Math.PI*2); ctx.stroke();
  }

  requestAnimationFrame(frame);
}
frame();

/* ---------- INTERACTION ---------- */
const veil = document.getElementById('veil');
const hint = document.getElementById('hint');
let lastTouch = 0;

function begin(){
  if(!started){
    started = true;
    initAudio();
    veil.classList.add('gone');
    setTimeout(()=>hint.classList.add('show'), 1500);
    setTimeout(()=>hint.classList.remove('show'), 9000);
    setTimeout(()=>document.getElementById('gear').classList.add('show'), 2500);
  }
}

function touch(x, y){
  if(AC && AC.state !== 'running') unlock();
  const now = performance.now();
  const vel = Math.min(1, (now-lastTouch < 90) ? 0.8 : 0.45 + Math.random()*0.25);
  lastTouch = now;
  const freq = nearestNote(y);
  voice(freq, vel, x/W);
  spawnBloom(x, y, freq);
}

function onDown(e){
  e.preventDefault();
  begin();
  const pts = e.touches ? e.touches : [e];
  for(const p of pts) touch(p.clientX, p.clientY);
}
function onMove(e){
  if(!started) return;
  e.preventDefault();
  // throttle drags into gentle notes — wider spacing so rings don't crowd
  if(performance.now() - lastTouch < 320) return;
  const p = e.touches ? e.touches[0] : e;
  if(p) touch(p.clientX, p.clientY);
}

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', e=>{ if(e.buttons) onMove(e); });
cv.addEventListener('touchstart', onDown, {passive:false});
cv.addEventListener('touchmove', onMove, {passive:false});
cv.addEventListener('touchend', e=>{ begin(); unlock&&unlock(); }, {passive:true});
veil.addEventListener('mousedown', onDown);
veil.addEventListener('touchstart', onDown, {passive:false});
veil.addEventListener('touchend', e=>{ begin(); }, {passive:true});

/* ---------- CONTROLS ---------- */
const gear = document.getElementById('gear');
const panel = document.getElementById('panel');

function togglePanel(e){
  e.preventDefault(); e.stopPropagation();
  panel.classList.toggle('open');
}
gear.addEventListener('click', togglePanel);
gear.addEventListener('touchend', togglePanel, {passive:false});

// stop panel taps from leaking through to the canvas (which would play notes)
['mousedown','touchstart','touchmove','touchend'].forEach(ev=>{
  panel.addEventListener(ev, e=>e.stopPropagation(), {passive:false});
});

function setMode(name){
  CURRENT = MODES[name];
  buildScale(CURRENT);
  retuneDrones();           // glides the bed to the new tonic over ~3s
  harmonized.clear();
  document.querySelectorAll('.mode').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode === name);
  });
}
document.querySelectorAll('.mode').forEach(btn=>{
  btn.addEventListener('click', ()=>setMode(btn.dataset.mode));
});

// sliders
const sSpace   = document.getElementById('s-space');
const sLight   = document.getElementById('s-light');
const sDensity = document.getElementById('s-density');
const sDrift   = document.getElementById('s-drift');

function applyDrift(){
  driftNodes.forEach(d => { if(d.node) d.node.gain.value = d.base * driftMul; });
}

sSpace.addEventListener('input', e=>{
  const v = e.target.value/100;          // 0..1
  if(wetGain) wetGain.gain.value = v;    // reverb amount
});
sLight.addEventListener('input', e=>{
  const v = e.target.value/100;          // 0..1
  toneBase = 400 + v*1900;               // darker -> brighter plucks
});
sDensity.addEventListener('input', e=>{
  const v = e.target.value/100;          // 0..1
  densityMul = 0.45 + v*2.0;             // sparser -> busier self-play
});
sDrift.addEventListener('input', e=>{
  const v = e.target.value/100;          // 0..1
  driftMul = 0.2 + v*1.8;                // still -> heaving modulation
  applyDrift();
});
</script>
</body>
</html>
